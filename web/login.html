<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Login - App Salute Digitale</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Header caricato da common.js -->
    <div id="header"></div>

    <main class="page-container">

        <section class="page-title">
            <h1>Accesso alla dashboard</h1>
            <p>Inserisci le tue credenziali per accedere all'area riservata.</p>
        </section>

        <section class="form-section">

            <form id="loginForm" action="php/login_action.php" method="post">

                <fieldset>
                    <legend>Dati di accesso</legend>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="Inserisci la tua email"
                            required>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Inserisci la password"
                            required>
                    </div>

                    <div class="form-buttons">
                        <button type="submit">Accedi</button>
                        <a href="register.html" class="button-link secondary-button">Registrati</a>
                    </div>

                </fieldset>

            </form>

            <p id="message"></p>

        </section>

    </main>

    <!-- Footer caricato da common.js -->
    <div id="footer"></div>

    <script src="js/common.js"></script>
    <script src="js/validation.js"></script>

</body>
</html>
